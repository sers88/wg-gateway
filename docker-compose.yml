# docker-compose.yml for local development / testing
# Production deployments (Unraid) should use host networking directly.
#
# Usage:
#   cp .env.example .env   # then edit WG_HOST
#   docker compose up -d

services:
  wg-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ksantd/wg-gateway:latest
    container_name: wg-gateway
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./data/wireguard:/data/wireguard
      - ./data/mihomo:/data/mihomo
      - ./data/ui:/data/ui
      - ./data/logs:/data/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
